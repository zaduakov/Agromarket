<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"/>
<title>AgroMarket</title>

<link rel="stylesheet" href="style.css">
</head>

<body>
  <div id="wa-popup" class="wa-popup">
    <div class="wa-popup-content">
      <span>Напишите нам 👋</span>
      <button onclick="closePopup()">✖</button>
    </div>
  </div>
  
    <div id="overlay" onclick="toggleCart()"></div>
<header>
  <div class="logo">AgroMarket</div>

  <div class="search">
    <input id="searchInput" type="text" placeholder="Поиск (помидоры, огурцы...)">
    <div class="search-suggestions" id="suggestions"></div>
  </div>

  <div class="cart-btn" onclick="toggleCart()">🛒 (<span id="cartCount">0</span>)</div>
</header>
<div class="categories">
  <span onclick="filterCategory('all')" class="active">Все</span>
  <span onclick="filterCategory('vegetables')">Овощи</span>
  <span onclick="filterCategory('plants')">Саженцы</span>
  <span onclick="filterCategory('trees')">Деревья</span>
  <span onclick="filterCategory('meat')">Мясо</span>
  <span onclick="filterCategory('Dairy products')">Молочные продукты</span>
</div>

<div class="filters">
  <label>Цена от: <input type="number" id="priceMin"></label>
  <label>до: <input type="number" id="priceMax"></label>
  <button onclick="filterPrice()">Применить</button>
</div>

<div class="products" id="products"></div>

<!-- Корзина -->
<div class="mini-cart" id="miniCart">
  <h2>Корзина</h2>
  <div id="cartItems"></div>
  <div class="checkout" id="checkoutBtn">Оформить заказ</div>
  <div class="cart-total">
    <span>Итого:</span>
    <span id="cartTotal">0</span> ₸
  </div>
</div>

<a href="https://web.whatsapp.com/send?phone=77006730968&text=Здравствуйте,%20я%20хочу%20заказать" target="_blank"
style="
  position: fixed;
  bottom: 25px;
  right: 25px;
  background-color: #25D366;
  color: white;
  border-radius: 50%;
  width: 60px;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 30px;
  box-shadow: 0 4px 8px rgba(0,0,0,0.2);
  text-decoration: none;
  z-index: 1000;
  transition: transform 0.2s ease-in-out;
  cursor: pointer;
"
onmouseover="this.style.transform='scale(1.08)'" onmouseout="this.style.transform='scale(1)'">
<i class="fa-brands fa-whatsapp"></i>
</a>
<script src="main.js">
</script>
</body>
</html>
