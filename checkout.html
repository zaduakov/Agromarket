<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Оформление заказа</title>
<link rel="stylesheet" href="checkout.css">
</head>
<body>
<header>
  <h1>Оформление заказа</h1>
</header>

<main class="checkout-container">
  <!-- Левый блок: корзина -->
  <div class="checkout-cart">
    <h2>Ваша корзина</h2>
    <div id="cart-items"></div>
    <div class="cart-total">
      <span>Итого:</span>
      <span id="total-price">0 ₸</span>
    </div>
  </div>

  <!-- Правый блок: форма с шагами -->
  <div class="checkout-form">
    <h2>Данные для доставки</h2>
    <div class="progress-bar">
      <div class="step active">1</div>
      <div class="step">2</div>
      <div class="step">3</div>
    </div>

    <form id="order-form">
      <div class="step-form active-step">
        <label>Имя<input type="text" placeholder="Введите имя" required></label>
        <label>Телефон<input type="tel" placeholder="+7 ___ ___ __ __" required></label>
        <button type="button" class="btn-next">Далее</button>
      </div>
      <div class="step-form">
        <label>Адрес<input type="text" placeholder="Город, улица, дом" required></label>
        <label>Способ оплаты
          <select required>
            <option value="cash">Наличными</option>
            <option value="card">Картой</option>
          </select>
        </label>
        <button type="button" class="btn-next">Далее</button>
      </div>
      <div class="step-form">
        <p>Проверьте ваш заказ и нажмите "Подтвердить".</p>
        <button type="submit" class="btn-submit">Подтвердить</button>
      </div>
      <a id="whatsapp-btn" href="#" target="_blank" style="display:none; margin-top:15px; text-decoration:none;">
        <button style="background:#25D366; color:white; padding:12px; border:none; border-radius:10px; width:100%; font-size:16px; cursor:pointer;">
          Отправить заказ в WhatsApp
        </button>
      </a>
    </form>
  </div>
</main>

<script src="checkout.js"></script>
</body>
</html>
